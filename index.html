<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID-Judo Klassifikationsdashboard</title>
  <link rel="icon" type="image/png" href="IMG_4224.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *:focus-visible {
      outline: 3px solid #f57c00;
      outline-offset: 3px;
      border-radius: 4px;
    }
  </style>
</head>
<body style="margin:0;padding:0;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const T = {
      de: {
        title: "ID-Judo Klassifikationsdashboard",
        subtitle: "Bitte beantworten Sie jede Fragestellung mit Ja oder Nein.",
        ja: "Ja", nein: "Nein",
        calculate: "Klassifikation berechnen",
        weight: "Gewichtung", points: "Punkte",
        wk1desc: "Hohe Wettkampffähigkeit",
        wk2desc: "Eingeschränkte Wettkampffähigkeit",
        wk3desc: "Hoher Unterstützungsbedarf",
        contrastLabel: "Kontrast",
        fontSmaller: "Schrift verkleinern",
        fontLarger: "Schrift vergrößern",
        langLabel: "Sprache",
        sections: [
          {
            title: "A. Motorische Fähigkeiten",
            questions: [
              ["Kann der Judoka sicher vorwärts und rückwärts fallen?", 5],
              ["Kann der Judoka beidseitig eine Wurftechnik ausführen?", 4],
              ["Kann der Judoka Gleichgewichtsstörungen kontrollieren?", 5],
              ["Kann der Judoka eigenständig Griffkampf durchführen?", 4],
              ["Kann der Judoka mindestens 3 Techniken korrekt demonstrieren?", 4],
              ["Kann der Judoka Übergänge Stand/Boden selbstständig ausführen?", 3],
              ["Kann der Judoka eine Bodentechnik länger als 10 Sekunden stabil halten?", 3],
              ["Kann der Judoka Bewegungsaufgaben nach einmaliger Erklärung umsetzen?", 4],
              ["Kann der Judoka Richtung und Distanz im Kampf kontrollieren?", 4],
              ["Kann der Judoka über 2 Minuten konzentriert kämpfen/trainieren?", 3],
            ],
          },
          {
            title: "B. Kognitive und regelbezogene Fähigkeiten",
            questions: [
              ["Versteht der Judoka die Kommandos Hajime und Mate?", 5],
              ["Erkennt der Judoka Kampfbeginn und Kampfende selbstständig?", 4],
              ["Kennt der Judoka die Wettkampffäche und deren Grenzen?", 3],
              ["Kann der Judoka verbotene Handlungen vermeiden?", 5],
              ["Versteht der Judoka Sieg und Niederlage im Wettkampf?", 3],
              ["Kann der Judoka taktische Anweisungen umsetzen?", 4],
              ["Kann der Judoka Kampfsituationen antizipieren?", 4],
              ["Erkennt der Judoka Haltegriffe oder Wertungen?", 3],
              ["Kann der Judoka sich selbstständig aufwärmen?", 2],
              ["Kann der Judoka eigenständig zum Kampf aufgerufen werden?", 2],
            ],
          },
          {
            title: "C. Soziale und adaptive Fähigkeiten",
            questions: [
              ["Kann der Judoka selbstständig mit Partnern trainieren?", 4],
              ["Hält der Judoka Sicherheitsregeln zuverlässig ein?", 5],
              ["Kann der Judoka Frustration kontrollieren?", 4],
              ["Kann der Judoka nach Niederlagen angemessen reagieren?", 3],
              ["Kann der Judoka sich in Gruppenstrukturen orientieren?", 3],
              ["Benötigt der Judoka keine dauerhafte 1:1-Betreuung?", 5],
              ["Kann der Judoka selbstständig auf die Matte gehen?", 3],
              ["Kann der Judoka auf unbekannte Gegner angemessen reagieren?", 4],
              ["Kann der Judoka soziale Distanzregeln im Wettkampf einhalten?", 2],
              ["Kann der Judoka mehrere Kämpfe an einem Tag bewältigen?", 3],
            ],
          },
        ],
      },
      en: {
        title: "ID-Judo Classification Dashboard",
        subtitle: "Please answer each question with Yes or No.",
        ja: "Yes", nein: "No",
        calculate: "Calculate Classification",
        weight: "Weight", points: "Points",
        wk1desc: "High Competition Readiness",
        wk2desc: "Limited Competition Readiness",
        wk3desc: "High Support Needs",
        contrastLabel: "Contrast",
        fontSmaller: "Decrease font size",
        fontLarger: "Increase font size",
        langLabel: "Language",
        sections: [
          {
            title: "A. Motor Skills",
            questions: [
              ["Can the judoka fall safely forward and backward?", 5],
              ["Can the judoka perform a throwing technique on both sides?", 4],
              ["Can the judoka control balance disruptions?", 5],
              ["Can the judoka independently engage in grip fighting?", 4],
              ["Can the judoka correctly demonstrate at least 3 techniques?", 4],
              ["Can the judoka independently execute standing-to-ground transitions?", 3],
              ["Can the judoka hold a ground technique stably for more than 10 seconds?", 3],
              ["Can the judoka implement movement tasks after a single explanation?", 4],
              ["Can the judoka control direction and distance in combat?", 4],
              ["Can the judoka concentrate on fighting/training for over 2 minutes?", 3],
            ],
          },
          {
            title: "B. Cognitive and Rule-Based Skills",
            questions: [
              ["Does the judoka understand the commands Hajime and Mate?", 5],
              ["Does the judoka independently recognize the start and end of combat?", 4],
              ["Does the judoka know the competition area and its boundaries?", 3],
              ["Can the judoka avoid prohibited actions?", 5],
              ["Does the judoka understand victory and defeat in competition?", 3],
              ["Can the judoka implement tactical instructions?", 4],
              ["Can the judoka anticipate combat situations?", 4],
              ["Does the judoka recognize holds or scores?", 3],
              ["Can the judoka warm up independently?", 2],
              ["Can the judoka be called to combat independently?", 2],
            ],
          },
          {
            title: "C. Social and Adaptive Skills",
            questions: [
              ["Can the judoka train independently with partners?", 4],
              ["Does the judoka reliably follow safety rules?", 5],
              ["Can the judoka control frustration?", 4],
              ["Can the judoka react appropriately after defeats?", 3],
              ["Can the judoka orient themselves in group structures?", 3],
              ["Does the judoka not require constant 1:1 supervision?", 5],
              ["Can the judoka independently go to the mat?", 3],
              ["Can the judoka react appropriately to unknown opponents?", 4],
              ["Can the judoka maintain social distance rules in competition?", 2],
              ["Can the judoka manage multiple fights in one day?", 3],
            ],
          },
        ],
      },
      tr: {
        title: "ID-Judo Sınıflandırma Paneli",
        subtitle: "Lütfen her soruyu Evet veya Hayır olarak yanıtlayın.",
        ja: "Evet", nein: "Hayır",
        calculate: "Sınıflandırmayı Hesapla",
        weight: "Ağırlık", points: "Puan",
        wk1desc: "Yüksek Müsabaka Hazırlığı",
        wk2desc: "Sınırlı Müsabaka Hazırlığı",
        wk3desc: "Yüksek Destek İhtiyacı",
        contrastLabel: "Kontrast",
        fontSmaller: "Yazıyı küçült",
        fontLarger: "Yazıyı büyüt",
        langLabel: "Dil",
        sections: [
          {
            title: "A. Motor Beceriler",
            questions: [
              ["Judoka güvenli şekilde ileri ve geri düşebiliyor mu?", 5],
              ["Judoka her iki tarafta atma tekniği uygulayabiliyor mu?", 4],
              ["Judoka denge bozulmasını kontrol edebiliyor mu?", 5],
              ["Judoka bağımsız olarak tuluş mücadelesi yapabiliyor mu?", 4],
              ["Judoka en az 3 tekniği doğru şekilde gösterebiliyor mu?", 4],
              ["Judoka ayakta/yerde geçişleri bağımsız yapabiliyor mu?", 3],
              ["Judoka bir yer tekniğini 10 saniyeden fazla tutabiliyor mu?", 3],
              ["Judoka tek açıklamadan sonra hareket görevlerini yerine getirebiliyor mu?", 4],
              ["Judoka mücadelede yön ve mesafeyi kontrol edebiliyor mu?", 4],
              ["Judoka 2 dakikadan fazla odaklı mücadele/antrenman yapabiliyor mu?", 3],
            ],
          },
          {
            title: "B. Bilişsel ve Kural Bazlı Beceriler",
            questions: [
              ["Judoka Hajime ve Mate komutlarını anlıyor mu?", 5],
              ["Judoka dövüş başlangıcını ve sonunu bağımsız tanıyor mu?", 4],
              ["Judoka müsabaka alanını ve sınırlarını biliyor mu?", 3],
              ["Judoka yasak hareketlerden kaçınabiliyor mu?", 5],
              ["Judoka müsabakada galibiyet ve yenilgiyi anlıyor mu?", 3],
              ["Judoka taktik talimatları uygulayabiliyor mu?", 4],
              ["Judoka dövüş durumlarını öngörebiliyor mu?", 4],
              ["Judoka tutmaları veya puanları tanıyor mu?", 3],
              ["Judoka bağımsız olarak ısınabiliyor mu?", 2],
              ["Judoka bağımsız olarak mücadeleye çağrılabiliyor mu?", 2],
            ],
          },
          {
            title: "C. Sosyal ve Uyum Becerileri",
            questions: [
              ["Judoka partnerlerle bağımsız antrenman yapabiliyor mu?", 4],
              ["Judoka güvenlik kurallarına güvenilir şekilde uyuyor mu?", 5],
              ["Judoka hayal kırıklığını kontrol edebiliyor mu?", 4],
              ["Judoka yenilgilerden sonra uygun tepki verebiliyor mu?", 3],
              ["Judoka grup yapılarında yönlenebiliyor mu?", 3],
              ["Judoka sürekli 1:1 gözetim gerektirmiyor mu?", 5],
              ["Judoka bağımsız olarak mindere çıkabiliyor mu?", 3],
              ["Judoka bilinmeyen rakiplere uygun tepki verebiliyor mu?", 4],
              ["Judoka müsabakada sosyal mesafe kurallarına uyabiliyor mu?", 2],
              ["Judoka bir günde birden fazla dövüşü kaldırabiliyor mu?", 3],
            ],
          },
        ],
      },
    };

    const MAX_SCORE = 114;
    const FONT_SIZES = [13, 15, 17, 20];

    function App() {
      const [lang, setLang] = useState("de");
      const [hc, setHc] = useState(false);
      const [fsIdx, setFsIdx] = useState(1);
      const [answers, setAnswers] = useState(Array(30).fill(false));
      const [result, setResult] = useState(null);

      const t = T[lang];
      const fs = FONT_SIZES[fsIdx];

      useEffect(() => {
        document.documentElement.lang = lang;
        document.body.style.background = hc ? "#000" : "#f0f2f5";
      }, [lang, hc]);

      let gi = 0;
      const secStart = t.sections.map((s) => { const i = gi; gi += s.questions.length; return i; });
      const allQ = t.sections.flatMap((s) => s.questions);

      const toggle = (idx, val) => {
        setAnswers((prev) => { const n = [...prev]; n[idx] = val; return n; });
        setResult(null);
      };

      const calculate = () => {
        const score = allQ.reduce((sum, q, i) => sum + (answers[i] ? q[1] : 0), 0);
        let wk, color;
        if (score >= 85) { wk = "WK 1"; color = "green"; }
        else if (score >= 50) { wk = "WK 2"; color = "yellow"; }
        else { wk = "WK 3"; color = "red"; }
        const desc = color === "green" ? t.wk1desc : color === "yellow" ? t.wk2desc : t.wk3desc;
        setResult({ score, wk, color, desc });
      };

      const onKey = (fn) => (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fn(); } };

      const c = {
        pageBg:     hc ? "#000"   : "#f0f2f5",
        cardBg:     hc ? "#111"   : "#fff",
        cardShadow: hc ? "none"   : "0 2px 8px rgba(0,0,0,0.08)",
        cardBorder: hc ? "1px solid #555" : "none",
        title:      hc ? "#fff"   : "#1a237e",
        section:    hc ? "#ffff00": "#1565c0",
        secBorder:  hc ? "#555"   : "#e3eaf5",
        text:       hc ? "#fff"   : "#222",
        sub:        hc ? "#bbb"   : "#555",
        meta:       hc ? "#999"   : "#999",
        divider:    hc ? "#333"   : "#f0f0f0",
        toolbarBg:  hc ? "#111"   : "#e8eaf6",
        toolbarBdr: hc ? "#444"   : "#c5cae9",
        inBg:       hc ? "#222"   : "#fff",
        inBorder:   hc ? "#777"   : "#ccc",
        inText:     hc ? "#fff"   : "#555",
        jaOn:       hc ? "#00c853": "#43a047",
        neinOn:     hc ? "#ff1744": "#e53935",
        calcBtn:    hc ? "#1a73e8": "#1565c0",
      };

      const resColors = {
        green:  hc ? { bg:"#003300", border:"#00c853", text:"#00ff88" } : { bg:"#d4f7d0", border:"#4caf50", text:"#1b5e20" },
        yellow: hc ? { bg:"#332200", border:"#ffab00", text:"#ffcc02" } : { bg:"#fff8cc", border:"#f9a825", text:"#6d4c00" },
        red:    hc ? { bg:"#330000", border:"#ff1744", text:"#ff8a80" } : { bg:"#ffd6d6", border:"#e53935", text:"#7f0000" },
      };

      const btnBase = {
        borderRadius: 8, border: "2px solid", fontWeight: 700,
        fontSize: fs - 1, cursor: "pointer", padding: "5px 13px",
      };

      return (
        <div style={{ fontFamily: "'Segoe UI', Arial, sans-serif", background: c.pageBg, minHeight: "100vh", padding: "20px 16px", maxWidth: 640, margin: "0 auto", fontSize: fs }}>

          <div role="toolbar" aria-label={`${t.langLabel} / ${t.contrastLabel}`} style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap", alignItems:"center", background:c.toolbarBg, borderRadius:10, padding:"8px 12px", border:`1px solid ${c.toolbarBdr}` }}>
            <div role="group" aria-label={t.langLabel} style={{ display:"flex", gap:4 }}>
              {["de","en","tr"].map((l) => (
                <button key={l} onClick={() => { setLang(l); setResult(null); }} onKeyDown={onKey(() => { setLang(l); setResult(null); })} aria-pressed={lang === l} aria-label={`${t.langLabel}: ${l.toUpperCase()}`} style={{ ...btnBase, borderColor: lang===l ? c.section : c.inBorder, background: lang===l ? c.section : c.inBg, color: lang===l ? "#fff" : c.text, textTransform:"uppercase" }}>{l.toUpperCase()}</button>
              ))}
            </div>
            <div style={{ flex:1 }} />
            <div role="group" aria-label="Font size" style={{ display:"flex", gap:4 }}>
              <button onClick={() => setFsIdx((i) => Math.max(0, i-1))} onKeyDown={onKey(() => setFsIdx((i) => Math.max(0, i-1)))} aria-label={t.fontSmaller} disabled={fsIdx === 0} style={{ ...btnBase, borderColor:c.inBorder, background:c.inBg, color:c.inText, opacity: fsIdx===0 ? 0.4 : 1, cursor: fsIdx===0 ? "default" : "pointer" }}>A−</button>
              <button onClick={() => setFsIdx((i) => Math.min(FONT_SIZES.length-1, i+1))} onKeyDown={onKey(() => setFsIdx((i) => Math.min(FONT_SIZES.length-1, i+1)))} aria-label={t.fontLarger} disabled={fsIdx === FONT_SIZES.length-1} style={{ ...btnBase, borderColor:c.inBorder, background:c.inBg, color:c.inText, opacity: fsIdx===FONT_SIZES.length-1 ? 0.4 : 1, cursor: fsIdx===FONT_SIZES.length-1 ? "default" : "pointer" }}>A+</button>
            </div>
            <button onClick={() => setHc((v) => !v)} onKeyDown={onKey(() => setHc((v) => !v))} aria-pressed={hc} aria-label={`${t.contrastLabel}: ${hc ? "on" : "off"}`} style={{ ...btnBase, borderColor: hc ? "#ffff00" : c.inBorder, background: hc ? "#000" : c.inBg, color: hc ? "#ffff00" : c.inText }}>{hc ? "◑" : "○"} {t.contrastLabel}</button>
          </div>

          <header style={{ marginBottom:24, display:"flex", alignItems:"center", gap:14 }}>
            <img src="IMG_4224.png" alt="ID-Judo Logo" style={{ height:56, width:"auto" }} />
            <div>
              <h1 style={{ fontSize: fs+7, fontWeight:700, color:c.title, margin:0 }}>{t.title}</h1>
              <p style={{ color:c.sub, fontSize:fs-1, marginTop:4, marginBottom:0 }}>{t.subtitle}</p>
            </div>
          </header>

          <main>
            {t.sections.map((section, sIdx) => {
              const startIdx = secStart[sIdx];
              return (
                <section key={sIdx} aria-label={section.title} style={{ background:c.cardBg, borderRadius:12, padding:"18px 16px", marginBottom:16, boxShadow:c.cardShadow, border:c.cardBorder }}>
                  <h2 style={{ fontSize:fs+2, fontWeight:700, color:c.section, marginTop:0, marginBottom:14, borderBottom:`2px solid ${c.secBorder}`, paddingBottom:8 }}>{section.title}</h2>
                  {section.questions.map((q, qIdx) => {
                    const idx = startIdx + qIdx;
                    const isJa = answers[idx];
                    const qId = `q-${idx}`;
                    return (
                      <div key={qIdx} style={{ borderBottom: qIdx < section.questions.length-1 ? `1px solid ${c.divider}` : "none", padding:"10px 0" }}>
                        <div id={qId} style={{ fontSize:fs, fontWeight:600, color:c.text, marginBottom:4 }}>{startIdx + qIdx + 1}. {q[0]}</div>
                        <div style={{ fontSize:fs-3, color:c.meta, marginBottom:8 }}>{t.weight}: {q[1]} {t.points}</div>
                        <div role="group" aria-labelledby={qId} style={{ display:"flex", gap:10 }}>
                          <button onClick={() => toggle(idx, true)} onKeyDown={onKey(() => toggle(idx, true))} aria-pressed={isJa} style={{ padding:"6px 22px", borderRadius:20, border:"2px solid", borderColor: isJa ? c.jaOn : c.inBorder, background: isJa ? c.jaOn : c.inBg, color: isJa ? "#fff" : c.inText, fontWeight:600, fontSize:fs-1, cursor:"pointer", transition:"all 0.15s" }}>{t.ja}</button>
                          <button onClick={() => toggle(idx, false)} onKeyDown={onKey(() => toggle(idx, false))} aria-pressed={!isJa} style={{ padding:"6px 22px", borderRadius:20, border:"2px solid", borderColor: !isJa ? c.neinOn : c.inBorder, background: !isJa ? c.neinOn : c.inBg, color: !isJa ? "#fff" : c.inText, fontWeight:600, fontSize:fs-1, cursor:"pointer", transition:"all 0.15s" }}>{t.nein}</button>
                        </div>
                      </div>
                    );
                  })}
                </section>
              );
            })}
          </main>

          <button onClick={calculate} onKeyDown={onKey(calculate)} style={{ width:"100%", padding:"16px", background:c.calcBtn, color:"#fff", border: hc ? "2px solid #fff" : "none", borderRadius:12, fontSize:fs+2, fontWeight:700, cursor:"pointer", marginTop:8, marginBottom:20, boxShadow: hc ? "none" : "0 4px 12px rgba(21,101,192,0.35)" }}>{t.calculate}</button>

          <div aria-live="polite" aria-atomic="true">
            {result && (() => {
              const rc = resColors[result.color];
              const pct = Math.round((result.score / MAX_SCORE) * 100);
              return (
                <div style={{ background:rc.bg, border:`2px solid ${rc.border}`, borderRadius:14, padding:24, textAlign:"center", marginBottom:32 }}>
                  <div style={{ fontSize:fs+17, fontWeight:800, color:rc.text }}>{result.wk}</div>
                  <div style={{ fontSize:fs+1, color:rc.text, marginTop:4 }}>{result.desc}</div>
                  <div role="progressbar" aria-valuenow={pct} aria-valuemin={0} aria-valuemax={100} aria-label={`${result.score} / ${MAX_SCORE}`} style={{ margin:"16px 0 8px", background:"#00000015", borderRadius:99, height:10, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${pct}%`, background:rc.border, borderRadius:99, transition:"width 0.6s ease" }} />
                  </div>
                  <div style={{ fontSize:fs-1, color:rc.text, fontWeight:600 }}>{result.score} / {MAX_SCORE} {t.points} ({pct}%)</div>
                </div>
              );
            })()}
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
